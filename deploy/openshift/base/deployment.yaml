apiVersion: apps/v1
kind: Deployment
metadata:
  name: summarizer-tech-klaviger
  labels:
    app.kubernetes.io/name: summarizer-tech-klaviger
    app.kubernetes.io/component: agent
    kagenti.io/type: agent
    kagenti.io/framework: Python
    kagenti.io/inject: disabled
    kagenti.io/spire: enabled
    kagenti.io/workload-type: deployment
    protocol.kagenti.io/a2a: ""
  annotations:
    kagenti.io/description: "Tech document summarizer (Klaviger sidecar)"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: summarizer-tech-klaviger
  template:
    metadata:
      labels:
        app.kubernetes.io/name: summarizer-tech-klaviger
        app.kubernetes.io/component: agent
        kagenti.io/type: agent
        kagenti.io/inject: disabled
        kagenti.io/spire: enabled
        kagenti.io/framework: Python
        kagenti.io/workload-type: deployment
        protocol.kagenti.io/a2a: ""
    spec:
      serviceAccountName: summarizer-tech-klaviger
      initContainers:
      # --- Sign agent card using SPIFFE identity ---
      - name: sign-agentcard
        image: ttl.sh/kcogan-agentcard-signer:24h
        imagePullPolicy: Always
        env:
        - name: SPIFFE_ENDPOINT_SOCKET
          value: "unix:///run/spire/agent-sockets/spire-agent.sock"
        - name: UNSIGNED_CARD_PATH
          value: "/etc/agentcard/agent.json"
        - name: AGENT_CARD_PATH
          value: "/app/.well-known/agent-card.json"
        - name: SIGN_TIMEOUT
          value: "30s"
        - name: AGENT_NAME
          value: "summarizer-tech-klaviger"
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        securityContext:
          runAsNonRoot: true
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            cpu: 100m
            memory: 64Mi
        volumeMounts:
        - name: spire-agent-socket
          mountPath: /run/spire/agent-sockets
          readOnly: true
        - name: unsigned-card
          mountPath: /etc/agentcard
          readOnly: true
        - name: signed-card
          mountPath: /app/.well-known
      containers:
      # --- Agent container (same image as existing summarizer-tech) ---
      - name: agent
        image: ghcr.io/redhat-et/zero-trust-agent-demo/kagenti-summarizer:dev
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 8000
          protocol: TCP
        env:
        - name: PORT
          value: "8000"
        - name: HOST
          value: "0.0.0.0"
        - name: HTTP_PROXY
          value: "http://127.0.0.1:8181"
        - name: HTTPS_PROXY
          value: "http://127.0.0.1:8181"
        - name: NO_PROXY
          value: "127.0.0.1,localhost"
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "http://otel-collector.kagenti-system.svc.cluster.local:8335"
        - name: UV_CACHE_DIR
          value: "/app/.cache/uv"
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 1Gi
        volumeMounts:
        - name: cache
          mountPath: /app/.cache
        - name: signed-card
          mountPath: /app/.well-known
          readOnly: true
      # --- Klaviger sidecar ---
      - name: klaviger
        image: ghcr.io/pavelanni/klaviger:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: proxy
          containerPort: 8180
          protocol: TCP
        - name: metrics
          containerPort: 8190
          protocol: TCP
        args:
        - "--config"
        - "/etc/klaviger/config.yaml"
        securityContext:
          runAsNonRoot: true
          runAsUser: 1001
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        resources:
          requests:
            cpu: 100m
            memory: 64Mi
          limits:
            cpu: 500m
            memory: 256Mi
        volumeMounts:
        - name: klaviger-config
          mountPath: /etc/klaviger
          readOnly: true
        - name: spire-agent-socket
          mountPath: /spiffe-workload-api
          readOnly: true
        - name: signed-card
          mountPath: /app/.well-known
          readOnly: true
      volumes:
      - name: cache
        emptyDir: {}
      - name: klaviger-config
        configMap:
          name: klaviger-config-summarizer-tech
      - name: spire-agent-socket
        csi:
          driver: csi.spiffe.io
          readOnly: true
      - name: unsigned-card
        configMap:
          name: summarizer-tech-klaviger-card-unsigned
      - name: signed-card
        emptyDir:
          medium: Memory
          sizeLimit: 1Mi
