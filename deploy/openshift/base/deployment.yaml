apiVersion: apps/v1
kind: Deployment
metadata:
  name: summarizer-tech-klaviger
  labels:
    app.kubernetes.io/name: summarizer-tech-klaviger
    app.kubernetes.io/component: agent
    kagenti.io/type: agent
    kagenti.io/framework: Python
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: summarizer-tech-klaviger
      kagenti.io/type: agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: summarizer-tech-klaviger
        app.kubernetes.io/component: agent
        kagenti.io/type: agent
        kagenti.io/framework: Python
    spec:
      serviceAccountName: summarizer-tech-klaviger
      containers:
      # --- Agent container (same image as existing summarizer-tech) ---
      - name: agent
        image: ghcr.io/redhat-et/zero-trust-agent-demo/kagenti-summarizer:dev
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 8000
          protocol: TCP
        env:
        - name: PORT
          value: "8000"
        - name: HOST
          value: "0.0.0.0"
        - name: HTTP_PROXY
          value: "http://127.0.0.1:8181"
        - name: HTTPS_PROXY
          value: "http://127.0.0.1:8181"
        - name: NO_PROXY
          value: "127.0.0.1,localhost"
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "http://otel-collector.kagenti-system.svc.cluster.local:8335"
        - name: UV_CACHE_DIR
          value: "/app/.cache/uv"
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 1Gi
        volumeMounts:
        - name: cache
          mountPath: /app/.cache
      # --- Klaviger sidecar ---
      - name: klaviger
        image: ghcr.io/pavelanni/klaviger:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: proxy
          containerPort: 8180
          protocol: TCP
        - name: metrics
          containerPort: 8190
          protocol: TCP
        args:
        - "--config"
        - "/etc/klaviger/config.yaml"
        securityContext:
          runAsNonRoot: true
          runAsUser: 1001
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        resources:
          requests:
            cpu: 100m
            memory: 64Mi
          limits:
            cpu: 500m
            memory: 256Mi
        volumeMounts:
        - name: klaviger-config
          mountPath: /etc/klaviger
          readOnly: true
        - name: spire-agent-socket
          mountPath: /spiffe-workload-api
          readOnly: true
      volumes:
      - name: cache
        emptyDir: {}
      - name: klaviger-config
        configMap:
          name: klaviger-config-summarizer-tech
      - name: spire-agent-socket
        csi:
          driver: csi.spiffe.io
          readOnly: true
