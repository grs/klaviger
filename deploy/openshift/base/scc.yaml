apiVersion: security.openshift.io/v1
kind: SecurityContextConstraints
metadata:
  name: klaviger-sidecar
  annotations:
    kubernetes.io/description: >-
      Minimal SCC for Klaviger sidecar. Allows RunAsAny UID
      (Klaviger runs as 1001) and SPIFFE CSI volumes. No privileged
      access, no host networking, no extra capabilities.
allowHostDirVolumePlugin: false
allowHostIPC: false
allowHostNetwork: false
allowHostPID: false
allowHostPorts: false
allowPrivilegeEscalation: false
allowPrivilegedContainer: false
allowedCapabilities: []
defaultAddCapabilities: []
requiredDropCapabilities:
- ALL
fsGroup:
  type: MustRunAs
readOnlyRootFilesystem: false
runAsUser:
  type: RunAsAny
seLinuxContext:
  type: MustRunAs
supplementalGroups:
  type: RunAsAny
volumes:
- configMap
- csi
- downwardAPI
- emptyDir
- persistentVolumeClaim
- projected
- secret
