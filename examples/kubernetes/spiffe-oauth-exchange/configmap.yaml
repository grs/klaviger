---
# ConfigMap for Alpha's Klaviger configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: klaviger-config-alpha
  labels:
    app: showme
    instance: alpha
data:
  config.yaml: |
    server:
      reverseProxyPort: 8180
      reverseProxyBind: "0.0.0.0"
      forwardProxyPort: 8181
      forwardProxyBind: "127.0.0.1"
      readTimeout: "30s"
      writeTimeout: "30s"
      tls:
        enabled: false
      spiffe:
        enabled: true
        socketPath: "unix:///run/spire/agent-sockets/spire-agent.sock"

    reverseProxy:
      backend: "http://127.0.0.1:8080"
      verification:
        mode: "jwt"
        jwt:
          jwksUrl: "http://oauth-server/.well-known/jwks.json"
          issuer: "http://oauth-server"
          audience: "alpha-service"
          cacheTtl: "5m"

    forwardProxy:
      defaultMode:
        type: "passthrough"
      hostRules:
      - hostPattern: "^beta(:|$)"
        mode:
          type: "oauth"
          oauth:
            tokenUrl: "http://oauth-server/token"
            audience: "beta-service"
            scope: "read write"
            cacheTtl: "5m"
      - hostPattern: "^gamma(:|$)"
        mode:
          type: "oauth"
          oauth:
            tokenUrl: "http://oauth-server/token"
            audience: "gamma-service"
            scope: "read"
            cacheTtl: "5m"
      - hostPattern: "^delta(:|$)"
        mode:
          type: "oauth"
          oauth:
            tokenUrl: "http://oauth-server/token"
            audience: "delta-service"
            scope: "write"
            cacheTtl: "5m"

    observability:
      metrics:
        enabled: true
        port: 8190
        path: "/metrics"
      tracing:
        enabled: false
      logging:
        level: "debug"
        format: "json"
