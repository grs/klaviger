# Alpha ServiceAccount
apiVersion: v1
kind: ServiceAccount
metadata:
  name: alpha
  labels:
    app: showme
    instance: alpha
---
# Beta ServiceAccount
apiVersion: v1
kind: ServiceAccount
metadata:
  name: beta
  labels:
    app: showme
    instance: beta
---
# Gamma ServiceAccount
apiVersion: v1
kind: ServiceAccount
metadata:
  name: gamma
  labels:
    app: showme
    instance: gamma
---
# Delta ServiceAccount
apiVersion: v1
kind: ServiceAccount
metadata:
  name: delta
  labels:
    app: showme
    instance: delta
---
# Role for service access
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: showme-access
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get"]
---
# RoleBinding for all ServiceAccounts
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: showme-access
roleRef:
  kind: Role
  name: showme-access
  apiGroup: rbac.authorization.k8s.io
subjects:
- kind: ServiceAccount
  name: alpha
- kind: ServiceAccount
  name: beta
- kind: ServiceAccount
  name: gamma
- kind: ServiceAccount
  name: delta
