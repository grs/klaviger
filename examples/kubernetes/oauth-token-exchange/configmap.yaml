---
# ConfigMap for Alpha's Klaviger configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: klaviger-config-alpha
  labels:
    app: showme
    instance: alpha
data:
  config.yaml: |
    server:
      reverseProxyPort: 8180
      reverseProxyBind: "0.0.0.0"
      forwardProxyPort: 8181
      forwardProxyBind: "127.0.0.1"
      readTimeout: "30s"
      writeTimeout: "30s"
      tls:
        enabled: false

    reverseProxy:
      backend: "http://127.0.0.1:8080"
      verification:
        mode: "jwt"
        jwt:
          jwksUrl: "http://keycloak/realms/demo/protocol/openid-connect/certs"
          issuer: "http://keycloak/realms/demo"
          audience: "alpha"
          cacheTtl: "5m"

    forwardProxy:
      defaultMode:
        type: "passthrough"
      hostRules:
      - hostPattern: "^beta(:|$)"
        mode:
          type: "oauth"
          oauth:
            tokenUrl: "http://keycloak/realms/demo/protocol/openid-connect/token"
            audience: "beta"
            cacheTtl: "5m"
            clientAuthMethod: "assertion"
            clientTokenPath: "/var/run/secrets/tokens/keycloaktoken"
      - hostPattern: "^gamma(:|$)"
        mode:
          type: "oauth"
          oauth:
            tokenUrl: "http://keycloak/realms/demo/protocol/openid-connect/token"
            audience: "gamma"
            cacheTtl: "5m"
            clientAuthMethod: "assertion"
            clientTokenPath: "/var/run/secrets/tokens/keycloaktoken"
      - hostPattern: "^delta(:|$)"
        mode:
          type: "oauth"
          oauth:
            tokenUrl: "http://keycloak/realms/demo/protocol/openid-connect/token"
            audience: "delta"
            cacheTtl: "5m"
            clientAuthMethod: "assertion"
            clientTokenPath: "/var/run/secrets/tokens/keycloaktoken"

    observability:
      metrics:
        enabled: true
        port: 8190
        path: "/metrics"
      tracing:
        enabled: false
      logging:
        level: "debug"
        format: "json"
