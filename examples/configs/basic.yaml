server:
  reverseProxyPort: 8080
  forwardProxyPort: 8081
  readTimeout: "30s"
  writeTimeout: "30s"
  tls:
    enabled: false

reverseProxy:
  backend: "http://127.0.0.1:9090"
  verification:
    mode: "jwt"
    jwt:
      jwksUrl: "https://auth.example.com/.well-known/jwks.json"
      issuer: "https://auth.example.com"
      audience: "my-api"
      requiredScopes: ["read:data"]
      cacheTtl: "5m"

forwardProxy:
  defaultMode:
    type: "passthrough"
  hostRules: []

observability:
  metrics:
    enabled: true
    port: 9090
    path: "/metrics"
  tracing:
    enabled: false
    endpoint: "http://localhost:4318"
    serviceName: "klaviger"
  logging:
    level: "info"
    format: "json"
